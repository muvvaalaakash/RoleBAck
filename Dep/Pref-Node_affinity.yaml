apiVersion: apps/v1
kind: Deployment
metadata:
  name: pref-node-affinity-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-affinity
  template:
    metadata:
      labels:
        app: node-affinity
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: env
                operator: In
                values:
                - prod
      containers:
      - name: pref-Node-flower-container
        image: nginx