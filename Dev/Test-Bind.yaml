kind: RoleBinding
metadata:
  name: test-group-binding
  namespace: team3-ns
subjects:
- kind: Group
  name: testing   # 👈 from certificate (O=testing)
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: test-role
  apiGroup: rbac.authorization.k8s.io