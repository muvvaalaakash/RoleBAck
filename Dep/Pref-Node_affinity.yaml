apiVersion: apps/v1
kind: Deployment
metadata:
  name: pref-node-affinity-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-affinity
  template:
    metadata:
      labels:
        app: node-affinity
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: aravind
                operator: In
                values:
                - dev
      containers:
      - name: pref-node-flower-container
        image: nginx